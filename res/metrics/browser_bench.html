<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fltx browser benchmarks</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar,
    .outputs {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #ffffff;
    }

    .toolbar {
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.7fr) auto auto;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    input,
    select,
    button {
      height: 38px;
      border-radius: 6px;
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      padding: 0 10px;
      background: #ffffff;
      color: #111827;
    }

    button,
    a.download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid #1f2937;
      padding: 0 14px;
      background: #1f2937;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      font-weight: 650;
    }

    button.secondary,
    a.download-link {
      border-color: #cbd5e1;
      background: #ffffff;
      color: #111827;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .status {
      margin: 0 0 16px;
      color: #334155;
      font-size: 14px;
      min-height: 20px;
    }

    .output-list {
      display: grid;
      gap: 8px;
    }

    .output-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      font-size: 13px;
    }

    .output-path {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: Consolas, "Cascadia Mono", monospace;
    }

    pre {
      min-height: 320px;
      max-height: 58vh;
      margin: 0;
      padding: 14px;
      overflow: auto;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #0f172a;
      color: #dbeafe;
      font: 13px/1.45 Consolas, "Cascadia Mono", monospace;
      white-space: pre-wrap;
    }

    .stderr {
      color: #fecaca;
    }

    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>fltx browser benchmarks</h1>

    <section class="toolbar" aria-label="Benchmark controls">
      <label>
        Filter
        <input id="filter" value="[bench][fltx][f256]" autocomplete="off">
      </label>
      <label>
        Order
        <select id="order">
          <option value="decl">Declaration</option>
          <option value="lex">Lexical</option>
          <option value="rand">Random</option>
        </select>
      </label>
      <button id="run" type="button">Run</button>
      <button id="save" class="secondary" type="button" disabled>Save outputs</button>
    </section>

    <p id="status" class="status"></p>

    <section class="outputs" aria-label="Generated files">
      <div id="outputs" class="output-list"></div>
    </section>

    <pre id="log" aria-label="Benchmark log"></pre>
  </main>

  <script>
    const benchScriptPath = "/build/wasm32-release/tests/bench_tests_browser.js";
    const runButton = document.getElementById("run");
    const saveButton = document.getElementById("save");
    const filterInput = document.getElementById("filter");
    const orderInput = document.getElementById("order");
    const statusText = document.getElementById("status");
    const outputList = document.getElementById("outputs");
    const logElement = document.getElementById("log");
    let generatedFiles = [];

    function appendLog(text, className) {
      const span = document.createElement("span");
      if (className) span.className = className;
      span.textContent = `${text}\n`;
      logElement.appendChild(span);
      logElement.scrollTop = logElement.scrollHeight;
    }

    function makeArgs() {
      const args = [];
      const filter = filterInput.value.trim();
      if (filter) args.push(filter);
      args.push("--order", orderInput.value, "--colour-mode", "none");
      return args;
    }

    function walkFs(FS, root) {
      const out = [];
      const names = FS.readdir(root);
      for (const name of names) {
        if (name === "." || name === "..") continue;
        const path = `${root}/${name}`.replace(/\/+/g, "/");
        const stat = FS.stat(path);
        if (FS.isDir(stat.mode)) {
          out.push(...walkFs(FS, path));
        } else if (/\.(csv|svg)$/i.test(name)) {
          out.push(path);
        }
      }
      return out;
    }

    function repoRelativePath(path) {
      return path.replace(/^\/+/, "");
    }

    function renderOutputs() {
      outputList.textContent = "";
      for (const file of generatedFiles) {
        const row = document.createElement("div");
        row.className = "output-row";

        const path = document.createElement("div");
        path.className = "output-path";
        path.textContent = repoRelativePath(file.path);

        const link = document.createElement("a");
        link.className = "download-link";
        link.download = file.path.split("/").pop();
        link.href = URL.createObjectURL(new Blob([file.content], { type: file.mime }));
        link.textContent = "Download";

        row.append(path, link);
        outputList.append(row);
      }
    }

    function collectOutputs() {
      try {
        const FS = window.Module.FS;
        generatedFiles = walkFs(FS, "/res/bench").map((path) => {
          const isSvg = /\.svg$/i.test(path);
          return {
            path,
            content: FS.readFile(path, { encoding: "utf8" }),
            mime: isSvg ? "image/svg+xml" : "text/csv"
          };
        });

        renderOutputs();
        saveButton.disabled = generatedFiles.length === 0;
        statusText.textContent = `${generatedFiles.length} benchmark file(s) generated.`;
      } catch (error) {
        statusText.textContent = "Benchmark finished, but no CSV/SVG outputs were found.";
        appendLog(error && error.message ? error.message : String(error), "stderr");
      }
    }

    async function saveOutputs() {
      saveButton.disabled = true;
      let saved = 0;
      try {
        for (const file of generatedFiles) {
          const response = await fetch("/save-benchmark-file", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              path: repoRelativePath(file.path),
              content: file.content
            })
          });
          if (!response.ok) throw new Error(await response.text());
          saved += 1;
        }

        const collect = await fetch("/collect-table", { method: "POST" });
        if (!collect.ok) throw new Error(await collect.text());
        statusText.textContent = `${saved} file(s) saved, benchmark table regenerated.`;
      } catch (error) {
        statusText.textContent = "Save helper is not available; use the download links instead.";
        appendLog(error && error.message ? error.message : String(error), "stderr");
      } finally {
        saveButton.disabled = generatedFiles.length === 0;
      }
    }

    function runBenchmark() {
      runButton.disabled = true;
      saveButton.disabled = true;
      outputList.textContent = "";
      logElement.textContent = "";
      generatedFiles = [];
      statusText.textContent = "Running benchmark...";

      window.Module = {
        arguments: makeArgs(),
        print: (text) => appendLog(text),
        printErr: (text) => appendLog(text, "stderr"),
        postRun: collectOutputs,
        onAbort: (reason) => {
          statusText.textContent = "Benchmark aborted.";
          appendLog(reason || "aborted", "stderr");
        }
      };

      const script = document.createElement("script");
      script.src = `${benchScriptPath}?t=${Date.now()}`;
      script.onerror = () => {
        statusText.textContent = "Could not load the browser benchmark build.";
        runButton.disabled = false;
      };
      document.body.appendChild(script);
    }

    runButton.addEventListener("click", runBenchmark);
    saveButton.addEventListener("click", saveOutputs);
  </script>
</body>
</html>
