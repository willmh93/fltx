name: Precision Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  precision-tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            test_command: ./build/ninja-release/tests/precision_tests
          - name: Windows
            os: windows-latest
            test_command: .\build\ninja-release\tests\precision_tests.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch vcpkg registry baseline
        shell: bash
        run: |
          baseline="$(python -c "import json; print(json.load(open('vcpkg-configuration.json'))['default-registry']['baseline'])")"
          git -C vcpkg fetch --depth=1 --no-tags origin "$baseline"
          git -C vcpkg show "$baseline:versions/baseline.json" > /dev/null

      - name: Read vcpkg commit
        id: vcpkg
        shell: bash
        run: echo "commit=$(git -C vcpkg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.vcpkg.outputs.commit }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.vcpkg.outputs.commit }}-
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Ninja (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap vcpkg (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        run: cmake --preset ninja-release

      - name: Save vcpkg binary cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build precision tests
        run: cmake --build --preset ninja-release --target precision_tests --parallel

      - name: Run precision tests
        run: ${{ matrix.test_command }}
