name: IO Test Base

on:
  workflow_call:
    inputs:
      platform_name:
        required: true
        type: string
      runner:
        required: true
        type: string
      test_command:
        required: true
        type: string

jobs:
  io-tests:
    name: ${{ inputs.platform_name }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    env:
      VCPKG_CACHE_EPOCH: v1
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch vcpkg registry baseline
        shell: bash
        run: |
          baseline="$(python -c "import json; print(json.load(open('vcpkg-configuration.json'))['default-registry']['baseline'])")"
          git -C vcpkg fetch --depth=1 --no-tags origin "$baseline"
          git -C vcpkg show "$baseline:versions/baseline.json" > /dev/null

      - name: Read vcpkg commit
        id: vcpkg
        shell: bash
        run: echo "commit=$(git -C vcpkg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Ninja (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up build tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install autoconf automake libtool ninja
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix ninja)/bin" >> "$GITHUB_PATH"
          command -v autoconf
          command -v ninja

      - name: Set up Ninja (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Read compiler cache key
        id: compiler
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            compiler="$(cl 2>&1 | sed -n '1p' || true)"
          else
            compiler="$(c++ --version | sed -n '1p')"
          fi
          hash="$(COMPILER="$compiler" python -c "import hashlib, os; print(hashlib.sha256(os.environ['COMPILER'].encode()).hexdigest()[:16])")"
          echo "Compiler cache key input: $compiler"
          echo "id=$hash" >> "$GITHUB_OUTPUT"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-${{ env.VCPKG_CACHE_EPOCH }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.compiler.outputs.id }}-${{ steps.vcpkg.outputs.commit }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ env.VCPKG_CACHE_EPOCH }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.compiler.outputs.id }}-${{ steps.vcpkg.outputs.commit }}-
            vcpkg-${{ env.VCPKG_CACHE_EPOCH }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.compiler.outputs.id }}-
            vcpkg-${{ env.VCPKG_CACHE_EPOCH }}-${{ runner.os }}-${{ runner.arch }}-
            vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.vcpkg.outputs.commit }}-
            vcpkg-${{ runner.os }}-${{ runner.arch }}-

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        run: cmake --preset native-release -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON

      - name: Save vcpkg binary cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build IO tests
        run: cmake --build build/native-release --target io_tests --parallel

      - name: Run IO tests
        run: ${{ inputs.test_command }}
